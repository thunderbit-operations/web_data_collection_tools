<!DOCTYPE html>
<html>
<head>
    <title>Photo Gallery</title>
    <meta property="og:image" content="https://example.com/og-banner.jpg">
</head>
<body>
    <h1>Gallery</h1>
    <img src="/photos/sunset.jpg" alt="Beautiful sunset" width="800" height="600">
    <img src="/photos/mountain.png" alt="Mountain view" width="1200" height="900">
    <img src="/photos/flower.webp" alt="Flower closeup">
    <img src="/icons/arrow.svg" width="24" height="24">
    <img src="/tracking.gif" width="1" height="1">
    <img data-src="/photos/lazy-loaded.jpg" alt="Lazy loaded image">

    <picture>
        <source srcset="/photos/hero-2x.jpg 2x, /photos/hero-1x.jpg 1x">
        <img src="/photos/hero-1x.jpg" alt="Hero">
    </picture>

    <a href="/photos/full-size.jpg">View full size</a>
    <a href="/docs/report.pdf">Download report</a>

    <div style="background-image: url('/photos/bg-pattern.png')">
        Content with background
    </div>

    <img src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="spacer">
</body>
</html>
